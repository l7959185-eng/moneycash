<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Income - Admin Panel</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary: #1e293b; --accent: #4f46e5; --success: #10b981; --danger: #ef4444; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); display: flex; }
        .sidebar { width: 260px; background: var(--primary); color: white; height: 100vh; position: fixed; padding: 20px; box-sizing: border-box; }
        .sidebar h2 { font-size: 20px; margin-bottom: 30px; text-align: center; color: #818cf8; }
        .nav-btn { display: block; width: 100%; padding: 12px 15px; margin-bottom: 10px; background: none; border: none; color: #cbd5e1; text-align: left; cursor: pointer; border-radius: 8px; font-size: 15px; transition: 0.3s; }
        .nav-btn:hover { background: rgba(255,255,255,0.1); }
        .nav-btn.active { background: var(--accent); color: white; }
        .main-content { margin-left: 260px; width: calc(100% - 260px); padding: 30px; box-sizing: border-box; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .section { display: none; }
        .section.active { display: block; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .stat-card h3 { margin: 0; color: #64748b; font-size: 14px; text-transform: uppercase; }
        .stat-card p { margin: 10px 0 0; font-size: 28px; font-weight: bold; color: var(--primary); }
        .card { background: white; border-radius: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; padding: 15px; text-align: left; font-size: 13px; color: #64748b; border-bottom: 1px solid #e2e8f0; }
        td { padding: 15px; border-bottom: 1px solid #e2e8f0; font-size: 14px; }
        .btn-sm { padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; color: white; transition: 0.2s; }
        .btn-approve { background: var(--success); margin-right: 5px; }
        .btn-reject { background: var(--danger); }
        .btn-edit { background: var(--accent); color: white; }
        @media (max-width: 768px) {
            .sidebar { width: 70px; padding: 10px; }
            .sidebar h2, .nav-btn span { display: none; }
            .main-content { margin-left: 70px; width: calc(100% - 70px); }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>ADMIN PANEL</h2>
        <button class="nav-btn active" onclick="showTab('dashboard')"><i class="fa fa-home"></i> <span>ড্যাশবোর্ড</span></button>
        <button class="nav-btn" onclick="showTab('deposits')"><i class="fa fa-plus-circle"></i> <span>ডিপোজিট রিকোয়েস্ট</span></button>
        <button class="nav-btn" onclick="showTab('withdrawals')"><i class="fa fa-minus-circle"></i> <span>উইথড্র রিকোয়েস্ট</span></button>
        <button class="nav-btn" onclick="showTab('users')"><i class="fa fa-users"></i> <span>ইউজার লিস্ট</span></button>
    </div>

    <div class="main-content">
        <div id="dashboard" class="section active">
            <div class="header"><h1>ড্যাশবোর্ড</h1></div>
            <div class="stats-grid">
                <div class="stat-card"><h3>মোট ইউজার</h3><p id="totalUsers">0</p></div>
                <div class="stat-card"><h3>পেন্ডিং ডিপোজিট</h3><p id="pendingDeps">0</p></div>
                <div class="stat-card"><h3>পেন্ডিং উইথড্র</h3><p id="pendingWits">0</p></div>
            </div>
        </div>

        <div id="deposits" class="section">
            <div class="header"><h1>ডিপোজিট রিকোয়েস্ট (পেন্ডিং)</h1></div>
            <div class="card">
                <table>
                    <thead><tr><th>ইউজার ইমেইল</th><th>পরিমাণ</th><th>Trx ID</th><th>অ্যাকশন</th></tr></thead>
                    <tbody id="deposit-list"></tbody>
                </table>
            </div>
        </div>

        <div id="withdrawals" class="section">
            <div class="header"><h1>উইথড্র রিকোয়েস্ট (পেন্ডিং)</h1></div>
            <div class="card">
                <table>
                    <thead><tr><th>ইউজার ইমেইল</th><th>পরিমাণ</th><th>নাম্বার</th><th>অ্যাকশন</th></tr></thead>
                    <tbody id="withdraw-list"></tbody>
                </table>
            </div>
        </div>

        <div id="users" class="section">
            <div class="header"><h1>ইউজার ম্যানেজমেন্ট</h1></div>
            <div class="card">
                <table>
                    <thead><tr><th>ইমেইল</th><th>ব্যালেন্স</th><th>অ্যাকশন</th></tr></thead>
                    <tbody id="users-list"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // আপনার দেওয়া ফায়ারবেস কনফিগারেশন
        const firebaseConfig = {
            apiKey: "AIzaSyDR1OUrXU-whRGIiyPOLHDofTfya7ZTn0k",
            authDomain: "cash-38ff4.firebaseapp.com",
            projectId: "cash-38ff4",
            storageBucket: "cash-38ff4.firebasestorage.app",
            messagingSenderId: "926717258086",
            appId: "1:926717258086:web:bda01b0423d3a72c6e40a7",
            measurementId: "G-SMH35V12WR"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function showTab(tabId) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // রিয়েল টাইম ডাটা লোড
        function loadData() {
            // ড্যাশবোর্ড আপডেট
            db.collection('users').onSnapshot(snap => document.getElementById('totalUsers').innerText = snap.size);
            db.collection('deposits').where('status', '==', 'pending').onSnapshot(snap => {
                document.getElementById('pendingDeps').innerText = snap.size;
                let html = '';
                snap.forEach(doc => {
                    let d = doc.data();
                    html += `<tr><td>${d.email}</td><td>৳${d.amount}</td><td>${d.trx}</td>
                    <td><button class="btn-sm btn-approve" onclick="approveDep('${doc.id}', '${d.uid}', ${d.amount})">Approve</button>
                    <button class="btn-sm btn-reject" onclick="rejectAction('deposits', '${doc.id}')">Reject</button></td></tr>`;
                });
                document.getElementById('deposit-list').innerHTML = html;
            });

            db.collection('withdrawals').where('status', '==', 'pending').onSnapshot(snap => {
                document.getElementById('pendingWits').innerText = snap.size;
                let html = '';
                snap.forEach(doc => {
                    let d = doc.data();
                    html += `<tr><td>${d.email}</td><td>৳${d.amount}</td><td>${d.number}</td>
                    <td><button class="btn-sm btn-approve" onclick="updateStatus('withdrawals', '${doc.id}', 'approved')">Paid</button>
                    <button class="btn-sm btn-reject" onclick="rejectWithdraw('${doc.id}', '${d.uid}', ${d.amount})">Reject</button></td></tr>`;
                });
                document.getElementById('withdraw-list').innerHTML = html;
            });

            db.collection('users').onSnapshot(snap => {
                let html = '';
                snap.forEach(doc => {
                    let d = doc.data();
                    html += `<tr><td>${d.email}</td><td>৳${d.balance.toFixed(2)}</td>
                    <td><button class="btn-sm btn-edit" onclick="editBalance('${doc.id}', ${d.balance})">Edit</button></td></tr>`;
                });
                document.getElementById('users-list').innerHTML = html;
            });
        }

        async function approveDep(id, uid, amt) {
            if(!confirm("Approve করবেন?")) return;
            await db.collection('users').doc(uid).update({ balance: firebase.firestore.FieldValue.increment(amt) });
            await db.collection('deposits').doc(id).update({ status: 'approved' });
        }

        async function rejectAction(col, id) {
            if(confirm("Reject করবেন?")) await db.collection(col).doc(id).update({ status: 'rejected' });
        }

        async function rejectWithdraw(id, uid, amt) {
            if(confirm("Reject & Refund করবেন?")) {
                await db.collection('users').doc(uid).update({ balance: firebase.firestore.FieldValue.increment(amt) });
                await db.collection('withdrawals').doc(id).update({ status: 'rejected' });
            }
        }

        async function updateStatus(col, id, status) {
            if(confirm("অ্যাকশনটি নিশ্চিত?")) await db.collection(col).doc(id).update({ status: status });
        }

        async function editBalance(uid, curr) {
            let n = prompt("নতুন ব্যালেন্স কত?", curr);
            if(n) await db.collection('users').doc(uid).update({ balance: parseFloat(n) });
        }

        window.onload = loadData;
    </script>
</body>
</html>
